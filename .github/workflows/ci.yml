name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Test Node.js Components
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Run linter
      run: pnpm lint --if-present
    
    - name: Run tests
      run: pnpm test --if-present
    
    - name: Build
      run: pnpm build --if-present

  test-python:
    name: Test Python Components
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
    
    - name: Install dependencies
      working-directory: ./services/api
      run: |
        uv venv
        uv pip install -r pyproject.toml || uv pip install fastapi uvicorn pydantic anthropic python-dotenv httpx python-multipart pyyaml korean-lunar-calendar
    
    - name: Run tests
      working-directory: ./services/api
      run: |
        uv run pytest tests/ --if-present || echo "No tests found"
    
    - name: Check code formatting
      working-directory: ./services/api
      run: |
        uv pip install ruff
        uv run ruff check . || true

  docker-build:
    name: Test Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Test Docker Compose
      run: |
        docker compose -f infra/docker-compose.yml config
    
    - name: Build Docker images
      run: |
        docker compose -f infra/docker-compose.yml build --no-cache || true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'