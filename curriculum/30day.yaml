    keywords: ["일간", "일주", "본인", "기준점"]
    
  - day: 5
    title: "이병철 회장 사주 엔지니어링 분석"
    goal: "실제 인물 사주 풀이 시연"
    keywords: ["이병철", "삼성", "사례분석"]
    example_birth:
      datetime: "1910-02-12T08:00:00"
      is_lunar: true
      sex: "M"

