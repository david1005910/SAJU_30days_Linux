# 사주공학 30일 커리큘럼
# Educational progression from basics to advanced Saju analysis

episodes:
  # Week 1: 기초 개념 (Foundation)
  - day: 1
    title: "사주가 엔지니어링이 될 수 있을까?"
    goal: "채널 소개, 사주를 데이터로 보는 관점 제시"
    keywords: ["사주공학", "명리학", "데이터분석", "동양철학"]
    tone: "전직 CTO의 차분한 접근"
    
  - day: 2
    title: "천간지지, 우주의 좌표계"
    goal: "천간 10개, 지지 12개의 구조적 이해"
    keywords: ["천간", "지지", "갑을병정", "자축인묘"]
    example_birth:
      datetime: "1990-05-15T14:30:00"
      sex: "M"
    
  - day: 3
    title: "오행의 균형방정식"
    goal: "목화토금수 5원소의 상생상극 관계"
    keywords: ["오행", "목화토금수", "상생", "상극"]
    
  - day: 4
    title: "당신의 일간, 인생의 원점"
